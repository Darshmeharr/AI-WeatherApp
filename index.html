<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Weather App</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: white;
    text-align: center;
    padding: 50px;
}

.container {
    background: rgba(0,0,0,0.2);
    padding: 30px;
    border-radius: 15px;
    max-width: 400px;
    margin: auto;
}

input {
    padding: 10px;
    width: 70%;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #ffcc00;
    cursor: pointer;
    font-weight: bold;
}

.weather-box {
    margin-top: 20px;
}

.ai-box {
    margin-top: 20px;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌦️ AI Weather App</h1>
    
    <input type="text" id="city" placeholder="Enter city name">
    <button onclick="getWeather()">Check Weather</button>

    <div class="weather-box" id="weather"></div>
    <div class="ai-box" id="ai"></div>
</div>

<script>

const API_KEY = "YOUR_API_KEY";

async function getWeather() {
    const city = document.getElementById("city").value;

    if (!city) {
        alert("Please enter a city");
        return;
    }

    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if (data.cod !== 200) {
            document.getElementById("weather").innerHTML = "City not found";
            return;
        }

        const temp = data.main.temp;
        const condition = data.weather[0].main;
        const country = data.sys.country;

        document.getElementById("weather").innerHTML = `
            <h2>${data.name}, ${country}</h2>
            <p>🌡️ Temperature: ${temp}°C</p>
            <p>🌥️ Condition: ${condition}</p>
        `;

        generateAIAdvice(temp, condition);

    } catch (error) {
        console.log(error);
    }
}

// Simple AI logic
function generateAIAdvice(temp, condition) {
    let advice = "";

    if (temp > 30) {
        advice = "🔥 It's hot! Stay hydrated and avoid sun.";
    } else if (temp < 10) {
        advice = "❄️ It's cold! Wear warm clothes.";
    } else {
        advice = "🌤️ Weather is pleasant. Enjoy your day!";
    }

    if (condition.toLowerCase().includes("rain")) {
        advice += " ☔ Don't forget your umbrella!";
    }

    document.getElementById("ai").innerHTML = `
        <h3>🤖 AI Suggestion</h3>
        <p>${advice}</p>
    `;
}

</script>

</body>
</html>
